# ── coturn config for signal.abject.world ───────────────────────────────────
#
# Provides TURN relay so peers behind symmetric NAT / CGNAT (e.g. phones on
# cell data) can form WebRTC DataChannels when direct hole-punching fails.
#
# The Abjects signaling server (pnpm whisper) mints time-limited credentials
# for clients using the SAME shared secret configured here (static-auth-secret).
# Set that secret in whisper's environment as TURN_SECRET and point clients at
# these URLs via TURN_URLS. The secret never leaves this box.
#
# Install:   apt-get install coturn
# Enable:    set TURNSERVER_ENABLED=1 in /etc/default/coturn
# Run:       systemctl enable --now coturn
# Verify:    turnutils_uclient -v -t -u <user> -w <cred> signal.abject.world
#            or https://webrtc.github.io/samples/src/content/peerconnection/trickle-ice/

# Listening ports
listening-port=3478          # STUN + TURN over UDP/TCP
tls-listening-port=5349      # TURN over TLS (turns:) — survives locked-down
                             # carrier/corporate networks that only allow 443/TLS

# Public IP of this host. REQUIRED. Replace with the server's real public IP.
# If behind a 1:1 NAT use external-ip=<public>/<private>.
external-ip=REPLACE_WITH_PUBLIC_IP

# Relay endpoint and UDP relay port range (open these in the firewall).
listening-ip=0.0.0.0
relay-ip=0.0.0.0
min-port=49152
max-port=65535

# ── Authentication: time-limited (REST) credentials ─────────────────────────
# whisper computes:  username   = "<unix-expiry>:<peerId>"
#                    credential = base64(HMAC-SHA1(static-auth-secret, username))
use-auth-secret
static-auth-secret=REPLACE_WITH_SHARED_SECRET
realm=abject.world

# ── TLS for turns: (reuse the Let's Encrypt cert nginx already manages) ──────
cert=/etc/letsencrypt/live/signal.abject.world/fullchain.pem
pkey=/etc/letsencrypt/live/signal.abject.world/privkey.pem
# coturn runs as the `turnserver` user; grant it read access to the cert, e.g.
#   setfacl -R -m u:turnserver:rX /etc/letsencrypt/live /etc/letsencrypt/archive
# and add a deploy hook to reload coturn after cert renewal.

# ── Hardening ───────────────────────────────────────────────────────────────
fingerprint
no-multicast-peers
no-cli
# Deny relaying to internal/loopback ranges so the relay can't be abused as an
# SSRF pivot into the private network.
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=::1
denied-peer-ip=fc00::-fdff:ffff:ffff:ffff:ffff:ffff:ffff:ffff
denied-peer-ip=fe80::-fe80::ffff:ffff:ffff:ffff

# Quotas (tune to taste)
user-quota=12
total-quota=1200
