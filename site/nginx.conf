server {
    listen 80;
    server_name abject.world www.abject.world;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name abject.world www.abject.world;

    ssl_certificate /etc/letsencrypt/live/abject.world/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/abject.world/privkey.pem;

    root /var/www/abject.world;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Cache static assets
    location ~* \.(css|js|svg|png|jpg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
