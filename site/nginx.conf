# ── abject.world — static landing page ──

server {
    listen 80;
    server_name abject.world www.abject.world;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name abject.world www.abject.world;

    ssl_certificate /etc/letsencrypt/live/abject.world/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/abject.world/privkey.pem;

    root /var/www/abject.world;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Cache static assets
    location ~* \.(css|js|svg|png|jpg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}

# ── max.abject.world — Abjects app (pnpm client + pnpm serve) ──

server {
    listen 80;
    server_name max.abject.world;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name max.abject.world;

    ssl_certificate /etc/letsencrypt/live/max.abject.world/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/max.abject.world/privkey.pem;

    # Vite client (pnpm client — :5173)
    location / {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Vite HMR WebSocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Backend WebSocket (pnpm serve — :7719)
    location /ws {
        proxy_pass http://127.0.0.1:7719;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
