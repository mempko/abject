<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Abject</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #030308;
        font-family: "Inter", system-ui, -apple-system, sans-serif;
      }
      /* Abyss background layers — hidden until landing */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background:
          radial-gradient(ellipse 80% 60% at 50% 100%, rgba(57, 255, 142, 0.04) 0%, transparent 60%),
          radial-gradient(ellipse 50% 50% at 10% 80%, rgba(155, 89, 255, 0.035) 0%, transparent 50%),
          radial-gradient(ellipse 40% 40% at 90% 70%, rgba(57, 255, 142, 0.03) 0%, transparent 50%),
          radial-gradient(ellipse 60% 30% at 50% 0%, rgba(155, 89, 255, 0.02) 0%, transparent 50%);
        opacity: 0;
        transition: opacity 1.5s ease-in;
      }
      body.landed::before {
        opacity: 1;
        animation: abyss-breathe 12s ease-in-out infinite;
      }
      @keyframes abyss-breathe {
        0%, 100% { opacity: 0.7; }
        50% { opacity: 1; }
      }
      #abyss-bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
      }
      #app {
        position: relative;
        z-index: 1;
        width: 100%;
        height: 100%;
        transform: translateY(40px);
        opacity: 0;
        transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.6s ease-out;
      }
      #app.landed {
        transform: translateY(0);
        opacity: 1;
      }
      canvas {
        display: block;
        touch-action: none;  /* prevent browser gestures on canvas */
      }

      /* Login overlay */
      #login-overlay {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 10000;
        background: #030308;
        align-items: center;
        justify-content: center;
      }
      #login-overlay.visible {
        display: flex;
      }
      .login-card {
        background: #1a1b2e;
        border-radius: 12px;
        padding: 2rem;
        width: 340px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      }
      .login-card h1 {
        color: #e2e4f0;
        font-size: 1.25rem;
        font-weight: 600;
        margin-bottom: 1.5rem;
        text-align: center;
      }
      .login-card label {
        display: block;
        color: #9698ae;
        font-size: 0.8rem;
        margin-bottom: 0.3rem;
      }
      .login-card input {
        width: 100%;
        padding: 0.55rem 0.75rem;
        margin-bottom: 1rem;
        background: #13141f;
        border: 1px solid #2a2c42;
        border-radius: 6px;
        color: #e2e4f0;
        font-size: 0.9rem;
        font-family: inherit;
        outline: none;
        transition: border-color 0.15s;
      }
      .login-card input:focus {
        border-color: #6366f1;
      }
      .login-card button {
        width: 100%;
        padding: 0.6rem;
        background: #6366f1;
        border: none;
        border-radius: 6px;
        color: #fff;
        font-size: 0.9rem;
        font-weight: 500;
        font-family: inherit;
        cursor: pointer;
        transition: background 0.15s;
      }
      .login-card button:hover {
        background: #5254cc;
      }
      .login-error {
        color: #f87171;
        font-size: 0.8rem;
        text-align: center;
        margin-bottom: 0.75rem;
        min-height: 1.2em;
      }

      /* Connecting overlay */
      #connecting-overlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        transition: opacity 0.4s ease-out;
      }
      #connecting-overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #connecting-overlay.landed .connecting-logo {
        transform: translateY(-60px);
        opacity: 0;
      }
      #connecting-overlay.landed .connecting-status {
        opacity: 0;
      }
      .connecting-logo {
        font-family: "JetBrains Mono", "Fira Code", monospace;
        font-size: 1.6rem;
        font-weight: 700;
        color: #e0e0ea;
        margin-bottom: 1.25rem;
        text-shadow: 0 0 40px rgba(57, 255, 142, 0.1);
        transition: transform 0.7s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.5s ease-out;
      }
      .connecting-logo .accent {
        color: #39ff8e;
        text-shadow: 0 0 30px rgba(57, 255, 142, 0.3);
      }
      .connecting-status {
        font-family: "JetBrains Mono", "Fira Code", monospace;
        font-size: 0.8rem;
        color: #5a5a70;
        letter-spacing: 0.1em;
        transition: opacity 0.3s ease-out;
      }
      .connecting-dots::after {
        content: '';
        animation: dots 1.5s steps(4, end) infinite;
      }
      @keyframes dots {
        0%   { content: ''; }
        25%  { content: '.'; }
        50%  { content: '..'; }
        75%  { content: '...'; }
        100% { content: ''; }
      }
    </style>
  </head>
  <body>
    <div id="login-overlay">
      <div class="login-card">
        <h1>Abject</h1>
        <div id="login-error" class="login-error"></div>
        <form id="login-form" autocomplete="on">
          <label for="login-user">Username</label>
          <input id="login-user" name="username" type="text" autocomplete="username" required />
          <label for="login-pass">Password</label>
          <input id="login-pass" name="password" type="password" autocomplete="current-password" required />
          <button type="submit">Sign in</button>
        </form>
      </div>
    </div>
    <div id="connecting-overlay">
      <div class="connecting-logo"><span class="accent">{abject}</span></div>
      <div class="connecting-status">Descending into the depths<span class="connecting-dots"></span></div>
    </div>
    <canvas id="abyss-bg"></canvas>
    <div id="app"></div>
    <!-- Hidden input to trigger mobile virtual keyboard -->
    <input id="mobile-keyboard-proxy" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
      style="position:fixed;left:-9999px;top:0;width:1px;height:1px;opacity:0;pointer-events:none;z-index:-1;" />
    <script type="module" src="./index.ts"></script>
  </body>
</html>
