# pnpm settings. pnpm >= 10 reads dependency build-script approvals from
# here; pnpm 11 stopped reading the package.json "pnpm" field entirely (that
# field is kept for older pnpm versions and produces a harmless warning).
# No "packages" key: this is a single-package repo, not a multi-package
# workspace (site/ has its own separate pnpm-workspace.yaml).
onlyBuiltDependencies:
  - electron
  - esbuild
  - node-datachannel
# Windows-installer tooling; its build script is not needed on Linux/macOS.
# Listed so pnpm 11 treats it as an explicit decision instead of erroring.
ignoredBuiltDependencies:
  - electron-winstaller
