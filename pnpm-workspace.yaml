# pnpm settings. Dependency build-script approvals are declared in both
# formats: pnpm 11 reads allowBuilds (a name → boolean map) and removed the
# older keys; pnpm 10 reads onlyBuiltDependencies/ignoredBuiltDependencies.
# The package.json "pnpm" field is kept for pnpm <= 9.
# No "packages" key: this is a single-package repo, not a multi-package
# workspace (site/ has its own separate pnpm-workspace.yaml).

# pnpm >= 11
allowBuilds:
  electron: true
  esbuild: true
  node-datachannel: true
  # Windows-installer tooling; its build script is not needed on Linux/macOS
  electron-winstaller: false

# pnpm 10
onlyBuiltDependencies:
  - electron
  - esbuild
  - node-datachannel
ignoredBuiltDependencies:
  - electron-winstaller
